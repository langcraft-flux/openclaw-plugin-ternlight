name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/openclaw-plugin-ternlight/package-lock.json
      - run: npm ci
        working-directory: packages/openclaw-plugin-ternlight
      - run: npm run test:ci
        working-directory: packages/openclaw-plugin-ternlight
      - run: npm run pack:check
        working-directory: packages/openclaw-plugin-ternlight
